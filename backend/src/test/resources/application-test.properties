spring.application.name=turf-backend-test

# H2 in-memory database with MySQL compatibility mode
# NON_KEYWORDS=USER avoids "user" being treated as a reserved word
spring.datasource.url=jdbc:h2:mem:turfmanager_test;MODE=MYSQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Recreate schema each test run
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable email in tests
spring.mail.host=
spring.mail.port=0
