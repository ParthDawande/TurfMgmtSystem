spring.application.name=turf-backend-test

# Test database — separate schema from prod
spring.datasource.url=${TEST_DB_URL:jdbc:mysql://localhost:3306/turfmanager_test}
spring.datasource.username=${TEST_DB_USERNAME:root}
spring.datasource.password=${TEST_DB_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Recreate schema each test run
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable email in tests
spring.mail.host=
spring.mail.port=0
